name: Java Maven Docker Deploy
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
     - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build WAR using Maven
        run: mvn clean package

      - name: Build Docker Image
        run: docker build -t webapplication .

      - name: Stop Old Container
        run: docker rm -f webapplication-container || true

      - name: Run New Container
        run: |
          docker run -d \
          --name webapplication-container \
          -p 8000:800 \
          webapplication